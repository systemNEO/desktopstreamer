# Logging
logLevel: info
logDestinations: [stdout]

# RTMP-Ingestion auf Port 1935
rtmp: yes
rtmpAddress: :1935
rtmpEncryption: "no"

# HLS / LL-HLS-Output auf Port 8888
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsAllowOrigin: '*'

# Andere Protokolle deaktivieren
rtsp: no
webrtc: no
srt: no

# Auth-Modell: Path-as-Secret (wie Twitch/YouTube).
# Der zufällige Stream-Key wird Teil des RTMP-Pfads
# (z. B. rtmp://server/live/STREAMKEY). MediaMTX akzeptiert jeden
# Pfad und serviert ihn unter https://server/PATH/index.m3u8.
# 24 Zeichen Hex-Random sind für Brute-Force praktisch unbreakable.
paths:
  all_others:
